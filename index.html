<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>KSV Online</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#f5f5f5;
    padding:20px;
}

button{
    padding:10px 20px;
    margin:5px;
    font-size:18px;
}

input{
    padding:10px;
    font-size:18px;
    width:120px;
    text-align:center;
}

#status{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>KSV Online</h1>

<button id="createBtn">
Create Room
</button>

<br><br>

<input
    id="roomInput"
    maxlength="4"
    placeholder="1234">

<button id="joinBtn">
Join Room
</button>

<div id="status">
Not Connected
</div>
<script type="module">

document.getElementById("status").textContent =
"Module OK";

</script>
	
</script>

</body>
</html>
